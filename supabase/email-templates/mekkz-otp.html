<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dein Mekkz Anmeldecode</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#e2e8f0;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0f172a;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background:#1e293b;border-radius:16px;padding:32px 24px;">
          <tr>
            <td>
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:600;color:#f8fafc;">Dein Anmeldecode</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.5;color:#cbd5e1;">
                Gib diesen 6-stelligen Code in Mekkz ein, um fortzufahren. Der Code ist
                <strong>30 Minuten</strong> gültig.
              </p>
              <p style="margin:0 0 24px;text-align:center;font-size:36px;font-weight:700;letter-spacing:0.35em;color:#38bdf8;">
                {{ .Token }}
              </p>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#94a3b8;">
                Wenn du diese Anfrage nicht gestellt hast, kannst du diese E-Mail ignorieren.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
